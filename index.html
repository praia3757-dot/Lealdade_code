<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
<style>
    *{
        margin: 0;
        padding: 0px;
        box-sizing: border-box;
    }
    
    .navbar{
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 2%; 
        background-color: #333;
        color: white;
        font-family: sans-serif;
        

    }

    .nav-links{
        display: flex;
        list-style: none;

    }

    .nav-links li {
        margin-left: 25px;
        font-size: 26px;
    }

    .nav-links a{
        color: white;
        text-decoration: none;
        font-weight: 500;
        transition: 0.3s;

    }

    .nav-links :hover{
        color: #007bff;
    }

    .btn-contato{
        background-color: #007bff;
        padding: 8px 15px;
        border-radius: 5px;
    }
    body{
        background-color:rgb(32, 32, 47) ;
    }

    .hero{
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        color: white;
        min-height: 80vh;
        text-align: center;

    }

    .logo{
        
        font-size: 30px;
        
        
        
    }

    .logo a{
        color: white;
        text-decoration: none;
        font-weight: 500;
        transition: 0.3s;

    }

    .logo :hover{
        color: #007bff;

    }

    @media (max-width: 768px) {
    .navbar {
        flex-direction: column; 
        padding: 15px 0; /* Espaço em cima e embaixo */
        text-align: center;
    }

    .logo {
        margin-bottom: 10px;
        font-size: 24px; /* Logo um pouco menor no celular */
    }

    .nav-links {
        flex-direction: column; /* Links um embaixo do outro */
        width: 100%;
        background-color: #2a2a3d; /* Um fundo levemente diferente para destacar */
        padding: 10px 0;
    }

    .nav-links li {
        margin: 8px 0; /* Espaço entre os links para facilitar o clique com o dedo */
        font-size: 16px;
    }

    .hero h1 {
        font-size: 24px; /* Texto menor para caber na tela */
        padding: 0 10px;
    }

    iframe {
        width: 100%; /* O vídeo ocupa a largura total do celular */
        height: auto;
        aspect-ratio: 16 / 9; /* Mantém o formato de vídeo */
    }

    .container-combos {
        flex-direction: column; /* Cards um embaixo do outro */
        align-items: center;
    }

    .combo {
        width: 90%; /* Cards ocupam quase toda a largura */
    }
}

    



</style>
</head>

<body>
    <!-- #region navbar-->

<nav class="navbar">

    </ul>

</nav>
<!-- #endregion -->
<!-- #region section-->
<section class="hero">
    <h1>

    </h1>
    <p>
        veja minhas habilidades e outros sites e projetos que montei, fique a vontade pra checar as tags acima
    </p>
    

</section>
<!-- #endregion -->
</body>
</html>
